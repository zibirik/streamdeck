<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="StreamPanel">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f18"/>
      <stop offset="45%" stop-color="#1a1033"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <circle cx="980" cy="80" r="120" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="1050" cy="220" r="90" fill="#22d3ee" opacity="0.10"/>
  <circle cx="180" cy="260" r="110" fill="#f472b6" opacity="0.08"/>
  <rect x="64" y="64" width="72" height="72" rx="18" fill="url(#accent)" filter="url(#glow)"/>
  <rect x="82" y="82" width="36" height="36" rx="8" fill="#0f0f18" opacity="0.35"/>
  <text x="160" y="98" fill="#f8f8ff" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">StreamPanel</text>
  <text x="160" y="142" fill="#c8c8e0" font-family="Segoe UI, Arial, sans-serif" font-size="22">Your tablet becomes a control deck for PC, streaming &amp; automation</text>
  <rect x="160" y="176" width="132" height="34" rx="17" fill="#8b5cf6" opacity="0.22" stroke="#a78bfa" stroke-width="1"/>
  <text x="178" y="199" fill="#e9d5ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Android Tablet</text>
  <rect x="304" y="176" width="118" height="34" rx="17" fill="#22d3ee" opacity="0.16" stroke="#67e8f9" stroke-width="1"/>
  <text x="322" y="199" fill="#cffafe" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Windows PC</text>
  <rect x="434" y="176" width="96" height="34" rx="17" fill="#f472b6" opacity="0.16" stroke="#f9a8d4" stroke-width="1"/>
  <text x="452" y="199" fill="#fce7f3" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">OBS</text>
  <rect x="542" y="176" width="110" height="34" rx="17" fill="#4ade80" opacity="0.14" stroke="#86efac" stroke-width="1"/>
  <text x="560" y="199" fill="#dcfce7" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">Smart Home</text>
  <text x="64" y="268" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Dashboard · Macros · Live telemetry · Stream tools · Game HUD</text>
</svg>
